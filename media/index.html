<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; style-src {{cspSource}}; img-src {{cspSource}} https:; script-src 'nonce-{{nonce}}' 'unsafe-inline';"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create Project</title>
        <link href="{{stylesResetUri}}" rel="stylesheet" />
        <link href="{{stylesMainUri}}" rel="stylesheet" />

        <script nonce="{{nonce}}" src="{{templateIconsScript}}"></script>
        <script nonce="{{nonce}}" src="{{script}}" defer></script>
    </head>
    <body>
        <div class="wizard-container">
            <div class="wizard-header">
                <h1>Create a New Project</h1>
                <div class="search-container">
                    <input
                        type="text"
                        id="template-search"
                        placeholder="Search templates..."
                    />
                </div>
            </div>

            <div class="wizard-steps">
                <div class="step active" data-step="1">
                    <div class="step-number">1</div>
                    <div class="step-title">Choose Template</div>
                </div>
                <div class="step" data-step="2">
                    <div class="step-number">2</div>
                    <div class="step-title">Configure Project</div>
                </div>
                <div class="step" data-step="3">
                    <div class="step-number">3</div>
                    <div class="step-title">Additional Options</div>
                </div>
            </div>

            <div class="wizard-content">
                <!-- Step 1: Template Selection -->
                <div class="wizard-page active" id="template-selection">
                    <div class="template-filters">
                        <select id="project-group-select" name="project-group">
                            <option value="all">All Templates</option>
                            <option value="api">API</option>
                            <option value="blazor">Blazor</option>
                            <option value="cloud">Cloud</option>
                            <option value="console">Console</option>
                            <option value="desktop">Desktop</option>
                            <option value="extensions">Extensions</option>
                            <option value="game">Game</option>
                            <option value="iot">IoT</option>
                            <option value="lib">Libraries</option>
                            <option value="machinelearning">
                                Machine Learning
                            </option>
                            <option value="maui">MAUI</option>
                            <option value="mobile">Mobile</option>
                            <option value="test">Test</option>
                            <option value="web">Web</option>
                        </select>
                    </div>

                    <div class="template-grid" id="template-grid">
                        <!-- Templates will be dynamically populated here -->
                    </div>
                </div>

                <!-- Step 2: Project Configuration -->
                <div class="wizard-page" data-step="2">
                    <div class="config-form">
                        <div class="form-group">
                            <label for="projectName">Project name</label>
                            <input
                                type="text"
                                id="projectName"
                                name="projectName"
                                placeholder="MyProject"
                            />
                            <span class="help-text"
                                >The name of your project. This will also be
                                used as the default namespace.</span
                            >
                        </div>

                        <div class="form-group">
                            <label for="solution">Solution name</label>
                            <input
                                type="text"
                                id="solution"
                                name="solution"
                                placeholder="MySolution"
                            />
                            <span class="help-text"
                                >The name of the solution that will contain your
                                project.</span
                            >
                        </div>

                        <div class="form-group location">
                            <label for="inputLocal">Location</label>
                            <div class="location-input">
                                <input
                                    type="text"
                                    id="inputLocal"
                                    name="location"
                                    readonly
                                />
                                <button
                                    type="button"
                                    id="selectFolder"
                                    class="secondary-button"
                                >
                                    Browse
                                </button>
                            </div>
                            <span class="help-text"
                                >The folder where your project will be
                                created.</span
                            >
                        </div>
                    </div>
                </div>

                <!-- Step 3: Additional Options -->
                <div class="wizard-page" data-step="3">
                    <div class="config-form">
                        <div class="form-group">
                            <label>Framework</label>
                            <div id="framework-grid" class="framework-grid">
                                <!-- Framework cards will be populated here -->
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Authentication type</label>
                            <select id="auth-type" class="form-select">
                                <option value="None">None</option>
                                <option value="MicrosoftIdentityPlatform">
                                    Microsoft identity platform
                                </option>
                                <option value="Windows">Windows</option>
                            </select>
                            <span class="help-text"
                                >The type of authentication to use</span
                            >
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="https-checkbox"
                                    />
                                    Configure for HTTPS
                                    <span
                                        class="info-icon"
                                        title="Enables an HTTPS endpoint for the application"
                                        >ⓘ</span
                                    >
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="docker-checkbox"
                                    />
                                    Enable container support
                                    <span
                                        class="info-icon"
                                        title="Adds Dockerfile and container configuration"
                                        >ⓘ</span
                                    >
                                </label>
                            </div>
                        </div>

                        <div
                            class="form-group container-options"
                            style="display: none"
                        >
                            <label>Container OS</label>
                            <select id="container-os" class="form-select">
                                <option value="Linux">Linux</option>
                                <option value="Windows">Windows</option>
                            </select>

                            <label>Container build type</label>
                            <select
                                id="container-build-type"
                                class="form-select"
                            >
                                <option value="Dockerfile">Dockerfile</option>
                                <option value="DockerCompose">
                                    Docker Compose
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="openapi-checkbox"
                                    />
                                    Enable OpenAPI support
                                    <span
                                        class="info-icon"
                                        title="Adds OpenAPI (Swagger) support to the project"
                                        >ⓘ</span
                                    >
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="top-level-statements-checkbox"
                                    />
                                    Do not use top-level statements
                                    <span
                                        class="info-icon"
                                        title="Uses the traditional Program class structure instead of top-level statements"
                                        >ⓘ</span
                                    >
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="controllers-checkbox"
                                    />
                                    Use controllers
                                    <span
                                        class="info-icon"
                                        title="Uses controllers instead of minimal APIs"
                                        >ⓘ</span
                                    >
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="wizard-footer">
                <button id="prev-button" class="secondary-button" disabled>
                    Previous
                </button>
                <button id="next-button" class="primary-button">Next</button>
                <button
                    id="create-project-button"
                    class="primary-button"
                    style="display: none"
                >
                    Create Project
                </button>
            </div>
        </div>
    </body>
</html>
